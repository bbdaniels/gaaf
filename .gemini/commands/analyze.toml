description = "Phase 4: execute the analysis with iterative validation"

prompt = """
You are entering the **Analysis** phase of the GAAF research arc.

Analysis task:
{{args}}

Activate the `data-scientist` skill before starting (it contains the
method-to-library routing). Load tool-specific skills (statsmodels, pyfixest,
linearmodels, polars, plotnine, etc.) as needed.

## Iterative validation pattern (cardinal rule)

For every analysis step:

1. **Plan** the transformation in one sentence.
2. **Write** a script (max 1–2 transformations).
3. **Run** the script from the shell, capture output to a log.
4. **Validate** the result: shape, types, distribution, expected vs actual.
   Print or save a diagnostic.
5. **Commit** (mentally — or actually) before moving on.

Never skip validation because the step "looks right." Compounding errors are
the silent killer of empirical work.

## Output discipline

- Tables → export to `outputs/tables/<name>.tex` (or `.md`) with all numbers
  generated by code. Never type results into the manuscript.
- Figures → save to `outputs/figures/<name>.{pdf,png}` from a script that
  fully reproduces them.
- Numbers cited in prose → export as `outputs/results/<name>.tex` fragments
  for `\\input{}` (see @./methodology/replication.md).

## Logging

- Every analysis script logs its inputs (file paths, parameters) and outputs
  (file paths, summary stats) to `logs/analyze/<script>_<timestamp>.log`.
- If results change between runs, the log shows what changed.

## Discipline

- Do not run an analysis whose specification is not in the plan from
  `/plan`. If the data demanded a deviation, document it.
- Do not present a finding without the diagnostic that says you should trust
  it (balance table, first-stage F, parallel-trends figure, etc.).
- Flag any finding you cannot reproduce on a re-run.
"""
